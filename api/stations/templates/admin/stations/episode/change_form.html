{% extends "admin/change_form.html" %}
{% load i18n admin_urls %}

{% block extrahead %}
{{ block.super }}
<style>
/* Pipeline progress bar */
.pipeline-bar {
    display: flex;
    align-items: flex-start;
    margin: 8px 0 16px 0;
}
.pipeline-connector {
    width: 36px;
    height: 2px;
    background: #ddd;
    align-self: center;
    margin-top: -16px;
    flex-shrink: 0;
}
.pipeline-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 72px;
}
.pipeline-circle {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: bold;
    border: 2px solid #ddd;
    background: #fff;
    color: #ccc;
}
.pipeline-step.done .pipeline-circle {
    background: #28a745;
    border-color: #28a745;
    color: #fff;
}
.pipeline-step.current .pipeline-circle {
    background: #0d6efd;
    border-color: #0d6efd;
    color: #fff;
}
.pipeline-step.failed .pipeline-circle {
    background: #dc3545;
    border-color: #dc3545;
    color: #fff;
}
.pipeline-step.review .pipeline-circle {
    background: #e67e22;
    border-color: #e67e22;
    color: #fff;
}
.pipeline-step.terminal .pipeline-circle {
    background: #aaa;
    border-color: #aaa;
    color: #fff;
}
.pipeline-label {
    margin-top: 4px;
    font-size: 11px;
    color: #333;
    text-align: center;
    font-weight: 600;
}
.pipeline-badge {
    display: inline-block;
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 8px;
    margin-left: 2px;
    font-weight: normal;
    vertical-align: middle;
}
.pipeline-badge.failed { background: #fce4e4; color: #dc3545; }
.pipeline-badge.review { background: #fff3e0; color: #e67e22; }
.pipeline-badge.info { background: #e3f2fd; color: #0d6efd; }

/* Grouped sections */
.pipeline-section {
    border: 1px solid #ddd;
    border-radius: 3px;
    margin-bottom: 6px;
    background: #fff;
}
.pipeline-section-title {
    padding: 6px 10px;
    font-weight: 600;
    font-size: 12px;
    color: #333;
    background: #fafafa;
    border-bottom: 1px solid #ddd;
    display: flex;
    align-items: center;
    gap: 10px;
}
.pipeline-section-body {
    padding: 8px 10px;
}
.pipeline-section-body p {
    margin: 0 0 4px 0;
}
.pipeline-section-body pre {
    margin: 0;
}
.pipeline-meta {
    font-size: 12px;
    color: #555;
    margin-bottom: 4px;
}

/* Move books inline before pipeline */
.inline-group { order: -1; }
</style>

{% if awaiting_reprocess %}
<script>
(function() {
    var statusUrl = "{{ status_url }}";
    var interval = setInterval(function() {
        fetch(statusUrl)
            .then(function(r) { return r.json(); })
            .then(function(data) {
                var done = ["EXTRACTION_NO_BOOKS", "EXTRACTION_FAILED", "VERIFICATION_QUEUED", "COMPLETE", "REVIEW"];
                if (done.indexOf(data.status) !== -1) {
                    clearInterval(interval);
                    window.location.href = window.location.pathname;
                }
            })
            .catch(function() {});
    }, 2000);
})();
</script>
{% endif %}

{% if original %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Inject CSRF token into pipeline Mark as Complete form
    var csrfToken = document.querySelector('[name=csrfmiddlewaretoken]');
    if (csrfToken) {
        document.querySelectorAll('input[value="CSRF_PLACEHOLDER"]').forEach(function(el) {
            el.value = csrfToken.value;
        });
    }
    // Move book inlines before the pipeline fieldset
    var inlineGroup = document.querySelector('.inline-group');
    var pipelineFieldset = document.getElementById('pipeline-fieldset');
    if (!pipelineFieldset) {
        // Find the fieldset containing pipeline-bar
        var bar = document.querySelector('.pipeline-bar');
        if (bar) pipelineFieldset = bar.closest('fieldset');
    }
    if (inlineGroup && pipelineFieldset && pipelineFieldset.parentNode) {
        pipelineFieldset.parentNode.insertBefore(inlineGroup, pipelineFieldset);
    }
});
</script>
{% endif %}
{% endblock %}
